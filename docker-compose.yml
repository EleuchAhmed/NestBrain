services:
  # ── Ollama ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_model_data:/root/.ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    labels:
      - "com.pipeline.service=research-automation"

  # ── Ollama Init ──────────────────────────────────────────────
  # Pulls the default model on first run
  ollama-init:
    image: ollama/ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: pull mistral
    depends_on:
      - ollama
    labels:
      - "com.pipeline.service=research-automation"

  # ── Nestbrain Desktop (optional profile) ─────────────────────
  # GUI app containerization target; requires host display support.
  nestbrain:
    profiles: ["desktop"]
    build:
      context: .
      dockerfile: docker/Dockerfile.nestbrain
    env_file: .env
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0.0}
      - QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-xcb}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - QT_XCB_GL_INTEGRATION=xcb_glx
      - OLLAMA_HOST=http://ollama:11434
      - ZOTERO_HOST=http://host.docker.internal:23119
    working_dir: /workspace
    command: python -m nestbrain.main
    volumes:
      - ./:/workspace
      - ${OBSIDIAN_VAULT_PATH}:/vault:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ollama
    restart: on-failure:5
    labels:
      - "com.pipeline.service=research-automation"

volumes:
  ollama_model_data:
