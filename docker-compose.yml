services:
  # ── Watcher ──────────────────────────────────────────────────
  # Monitors Zotero storage/ for new PDFs, copies them to staging/
  watcher:
    build:
      context: .
      dockerfile: Dockerfile.watcher
    env_file: .env
    environment:
      - ZOTERO_STORAGE_PATH=/zotero/storage
      - ZOTERO_DB_PATH=/zotero/zotero.sqlite
    volumes:
      - ${ZOTERO_DATA_DIR:-C:\Users\Mega Pc\Zotero}:/zotero:ro
      - ./staging:/app/staging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    labels:
      - "com.pipeline.service=research-automation"

  # ── Ollama ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_model_data:/root/.ollama
    restart: unless-stopped
    labels:
      - "com.pipeline.service=research-automation"

  # ── Ollama Init ──────────────────────────────────────────────
  # Pulls the deepseek-r1:14b model on first run
  ollama-init:
    image: ollama/ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command: pull deepseek-r1:14b
    depends_on:
      - ollama
    labels:
      - "com.pipeline.service=research-automation"

  # ── Pipeline ─────────────────────────────────────────────────
  # Processes staged PDFs → AI analysis → Obsidian vault notes
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OBSIDIAN_VAULT_PATH=/vault
      - COLLECTION_NAME=${COLLECTION_NAME:-Research Synthesis}
      - ZOTERO_DATA_DIR=/zotero
    volumes:
      - ./staging:/app/staging
      - ${ZOTERO_DATA_DIR:-C:\Users\Mega Pc\Zotero}:/zotero:ro
      - ${NOTEBOOKLM_MCP_PATH:-.notebooklm-mcp}:/home/node/.notebooklm-mcp:ro
      - ${OBSIDIAN_VAULT_PATH}:/vault:rw
      - ./pipeline-registry.json:/app/pipeline-registry.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      watcher:
        condition: service_started
      ollama:
        condition: service_started
      ollama-init:
        condition: service_completed_successfully
    restart: unless-stopped
    labels:
      - "com.pipeline.service=research-automation"

  # ── Nestbrain Desktop (optional profile) ─────────────────────
  # GUI app containerization target; requires host display support.
  nestbrain:
    profiles: ["desktop"]
    build:
      context: .
      dockerfile: Dockerfile.nestbrain
    env_file: .env
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0.0}
      - QT_QPA_PLATFORM=${QT_QPA_PLATFORM:-xcb}
      - QT_X11_NO_MITSHM=1
      - LIBGL_ALWAYS_SOFTWARE=1
      - QT_XCB_GL_INTEGRATION=xcb_glx
      - OLLAMA_HOST=http://ollama:11434
      - ZOTERO_HOST=http://host.docker.internal:23119
    working_dir: /workspace
    command: python -m nestbrain.main
    volumes:
      - ./:/workspace
      - ${OBSIDIAN_VAULT_PATH}:/vault:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ollama
    restart: on-failure:5
    labels:
      - "com.pipeline.service=research-automation"

volumes:
  ollama_model_data:
